<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & App Icons -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://hhtrails.com/hht_final_logo_send.svg"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="https://hhtrails.com/favicon/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="https://hhtrails.com/favicon/web-app-manifest-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="https://hhtrails.com/favicon/web-app-manifest-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://hhtrails.com/favicon/apple-touch-icon.png"
    />
    <link
      rel="shortcut icon"
      href="https://hhtrails.com/favicon/favicon.ico"
    />

    <!-- Primary meta -->
    <title>Heritage Himalaya Trails</title>
    <meta
      name="description"
      content="Heritage Himalaya Trails – Authentic cultural and heritage tours across Ladakh and the Himalayan region. Discover ancient monasteries, Silk Route trails, and vibrant living traditions."
    />
    <meta
      name="keywords"
      content="Heritage Himalaya Trails, Ladakh tours, Ladakh heritage tours, Himalayan cultural tours, heritage walks Leh, Silk Route Ladakh, monastery tours Ladakh, cultural tours India, Himalayan travel experiences"
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#2B1E17" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Heritage Himalaya Trails" />
    <meta property="og:title" content="Heritage Himalaya Trails" />
    <meta
      property="og:description"
      content="Heritage Himalaya Trails – Authentic cultural and heritage tours across Ladakh and the Himalayan region. Discover ancient monasteries, Silk Route trails, and vibrant living traditions."
    />
    <meta
      property="og:image"
      content="https://hhtrails.com/hht_final_logo_send.svg"
    />
    <meta property="og:url" content="https://hhtrails.com/" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@HHTHimalaya" />
    <meta name="twitter:title" content="Heritage Himalaya Trails" />
    <meta
      name="twitter:description"
      content="Heritage Himalaya Trails – Authentic cultural and heritage tours across Ladakh and the Himalayan region. Discover ancient monasteries, Silk Route trails, and vibrant living traditions."
    />
    <meta
      name="twitter:image"
      content="https://hhtrails.com/hht_final_logo_send.svg"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://hhtrails.com/" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "@id": "https://hhtrails.com/#organization",
        "name": "Heritage Himalaya Trails",
        "url": "https://hhtrails.com/",
        "logo": "https://hhtrails.com/hht_final_logo_send.svg",
        "sameAs": [
          "https://twitter.com/HHTHimalaya"
        ]
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
